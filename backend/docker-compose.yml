services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: deepseek-postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deepseek}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-deepseek}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: deepseek-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: deepseek-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  verification-images:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepseek-verification-images
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env.docker
    command: [ "/bin/sh", "/app/backend/scripts/pull-images.sh" ]
    restart: "no"
    depends_on:
      - minio

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepseek-backend-api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PYTHON_DOTENV_DISABLED: "1"
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/deepseek}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      WORKSPACE_BASE: ${WORKSPACE_BASE:-/tmp/deepseek/workspaces}
      CHECKPOINT_BASE: ${CHECKPOINT_BASE:-/tmp/deepseek/checkpoints}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      verification-images:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - workspace_data:/tmp/deepseek/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /tmp/deepseek/checkpoints:mode=1777,size=1g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 10
    command: [ "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000" ]

  backend-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepseek-backend-worker
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PYTHON_DOTENV_DISABLED: "1"
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/deepseek}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      WORKSPACE_BASE: ${WORKSPACE_BASE:-/tmp/deepseek/workspaces}
      CHECKPOINT_BASE: ${CHECKPOINT_BASE:-/tmp/deepseek/checkpoints}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      verification-images:
        condition: service_completed_successfully
    volumes:
      - workspace_data:/tmp/deepseek/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /tmp/deepseek/checkpoints:mode=1777,size=1g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "celery", "-A", "src.worker.app", "worker", "--loglevel=info" ]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  workspace_data:
